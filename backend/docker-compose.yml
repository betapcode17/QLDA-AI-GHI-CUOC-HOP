services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_meeting_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_meeting_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
